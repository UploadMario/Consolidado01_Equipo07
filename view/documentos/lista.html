<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Documentos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-body">

<header class="topbar">
    <h1>Lista de Documentos</h1>
</header>

<nav class="menu">
    <a href="documento.html">Registrar documento</a>
    <a href="../remitos/remito.html">Remitos</a>
</nav>

<main class="card">

<div class="search-container">
    <input type="number" id="buscar-documento" placeholder="Buscar por ID">
    <input type="text" id="filtrar-destino" placeholder="Filtrar por destino">
</div>

<table id="tabla-documentos">
    <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Remitente</th>
            <th>Destino</th>
            <th>Estado</th>
            <th>Observaciones</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</main>

<script src="../js/app.js"></script>
</body>
</html>
