<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Remitos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <h1>Gestión de Remitos</h1>

    <!-- Formulario para crear un nuevo remito -->
    <div class="form-container">
        <h2>Crear Remito</h2>
        <form id="form-remito">
            <label for="despacho_destino">Despacho de Destino:</label>
            <input type="text" id="despacho_destino" required>

            <label for="descripcion">Descripción:</label>
            <textarea id="descripcion" required></textarea>

            <label for="documentos">Documentos (IDs separados por coma):</label>
            <input type="text" id="documentos" placeholder="Ej: 1, 2, 3" required>

            <button type="submit">Crear Remito</button>
        </form>
    </div>

    <!-- Lista de remitos -->
    <div class="list-container">
        <h2>Lista de Remitos</h2>
        <table id="tabla-remitos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Despacho de Destino</th>
                    <th>Descripción</th>
                    <th>Cantidad de Documentos</th>
                    <th>Fecha de Emisión</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
