<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="page-body">
    <div id="sidebar-container"></div>

    <main class="contenido contenido-con-sidebar">
      <section class="page-header">
        <div>
          <p class="eyebrow">Control de usuarios</p>
          <h1>Gestión de Usuarios</h1>
          <p>Administra accesos multiusuario para operador, firmante y administrador.</p>
        </div>
      </section>

      <p id="error-usuarios" class="error-message"></p>

      <div class="card form-card">
        <h2>Registrar Usuario</h2>
        <form id="form-usuario">
          <div class="grid-form two-columns">
            <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" minlength="3" maxlength="100" required />
            </div>

            <div class="form-group">
              <label for="correo">Correo</label>
              <input type="email" id="correo" maxlength="100" required />
            </div>

            <div class="form-group">
              <label for="contrasena">Contraseña</label>
              <input type="password" id="contrasena" minlength="6" required />
              <small>Mínimo 6 caracteres, con una letra y un número.</small>
            </div>

            <div class="form-group">
              <label for="rol">Rol</label>
              <select id="rol" required>
                <option value="admin">Administrador</option>
                <option value="Operador">Operador</option>
                <option value="Firmante">Firmante</option>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" onclick="retrocederPagina()">Volver</button>
            <button type="submit">Registrar usuario</button>
          </div>
        </form>
      </div>

      <div class="card table-card">
        <h2>Lista de Usuarios</h2>
        <table id="tabla-usuarios">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Rol</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
      fetch("../components/sidebar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sidebar-container").innerHTML = data;
          if (typeof actualizarVisibilidadPorRol === "function") {
            actualizarVisibilidadPorRol();
          }
        });
    </script>
  </body>
</html>
