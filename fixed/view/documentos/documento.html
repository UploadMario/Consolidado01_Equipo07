<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Documento</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="page-body">

<header class="topbar">
    <h1>Registrar Documento</h1>
    <button onclick="logout()">Cerrar sesión</button>
</header>

<nav class="menu">
    <a href="lista.html">Lista de documentos</a>
    <a href="../remitos/remito.html">Remitos</a>
    <a id="btn-usuarios" href="../usuarios/usuario.html">Usuarios</a>
</nav>

<main class="card">

<form id="form-documento">
    <div class="form-group">
        <label for="codigo">Código</label>
        <input type="text" id="codigo" required>
    </div>

    <div class="form-group">
        <label for="tipo">Tipo de documento</label>
        <input type="text" id="tipo" required>
    </div>

    <div class="form-group">
        <label for="fecha_recepcion">Fecha de recepción</label>
        <input type="date" id="fecha_recepcion" required>
    </div>

    <div class="form-group">
        <label for="remitente">Remitente</label>
        <input type="text" id="remitente" required>
    </div>

    <div class="form-group">
        <label for="destino">Destino</label>
        <input type="text" id="destino" required>
    </div>

    <div class="form-group">
        <label for="observaciones">Observaciones</label>
        <textarea id="observaciones" rows="4" placeholder="Ingrese observaciones si aplica"></textarea>
    </div>

    <input type="hidden" id="estado" value="Pendiente de entrega">

    <div class="form-actions">
        <button type="submit">Registrar</button>
        <button type="button" id="btn-agregar-remito">Añadir a Remito</button>
    </div>
</form>

</main>

<script src="../js/app.js"></script>
</body>
</html>
